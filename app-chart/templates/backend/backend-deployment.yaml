apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-app-test
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: nest-app-test

  template:
    metadata:
      labels:
        app: nest-app-test

    spec:
      containers:
        - name: nest-app-test
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: "{{ .Values.backend.image.pullPolicy }}"
          ports:
            - containerPort: {{ .Values.backend.port }}

          envFrom:
            - secretRef:
                name: app-secret

          env:
            - name: NODE_ENV
              value: production

          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
