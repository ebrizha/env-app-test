apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: react-app-test-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: react-app-test
                port:
                  number: {{ .Values.frontend.port }}

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: nest-app-test
                port:
                  number: {{ .Values.backend.port }}