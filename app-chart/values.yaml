postgres:
  image: postgres:15
  db: nest_app_test
  user: postgres
  password: postgres
  port: 5432
  host: postgres
  storage: 1Gi

backend:
  image:
    repository: ebrizha/nest-app-test
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000

frontend:
  image:
    repository: ebrizha/react-app-test
    tag: "latest"
    pullPolicy: IfNotPresent
  replicas: 2
  port: 80
  apiUrl: http://react-app-test.local/api

ingress:
  host: react-app-test.local